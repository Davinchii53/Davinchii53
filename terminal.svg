<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <style>
    .bg { fill: #0d1117; }
    .text { font-family: 'Courier New', Courier, monospace; font-size: 9px; fill: #00F0FF; white-space: pre; font-weight: bold; }
    .glow { filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.8)); }
    .terminal-border { fill: none; stroke: #00F0FF; stroke-width: 2; opacity: 0.3; }
    .info-title { fill: #FF0055; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 13px; }
    .info-text { fill: #FFFFFF; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
    .info-label { fill: #00F0FF; font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: bold; }
    
    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(530px); }
    }
    .scanner { animation: scan 4s linear infinite; opacity: 0.15; }
    
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.5; }
    }
    .hologram { animation: flicker 6s infinite; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .pulse { animation: pulse 2s infinite; }
  </style>
  
  <rect class="bg" width="800" height="550" />
  <rect class="terminal-border glow" x="10" y="10" width="780" height="530" rx="5" />
  
  <!-- Scanning Line -->
